<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMTQ Loader</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #F0F5F2;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.08);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border-left-color: #059669;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #error-message {
            color: #dc2626;
            max-width: 85%;
            margin: 12px auto 0;
            font-size: 14px;
            line-height: 1.4;
        }
        #retry-button {
            margin-top: 16px;
            padding: 9px 20px;
            background-color: #059669;
            color: white;
            border: none;
            border-radius: 9999px;
            cursor: pointer;
            display: none;
            font-weight: 700;
            font-size: 13px;
            box-shadow: 0 2px 8px rgba(5, 150, 105, 0.2);
        }
        #retry-button:hover {
            background-color: #047857;
        }
    </style>
</head>
<body>
    <div id="loader" class="loader">
        <div class="spinner"></div>
        <p style="color: #064E3B; font-weight: 700; margin: 0; font-size: 16px;">Memuat MyMTQ...</p>
        <div id="error-message"></div>
        <button id="retry-button" onclick="fetchSheetData()">Coba Lagi</button>
    </div>
    <iframe id="contentIframe" style="display:none;"></iframe>
    
    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzUnwKv_XIojTQsazMTsV8WVulFc2zvJsejYrjKDqRGDjZbmcT6K-Ihr4huRPvmsbzp/exec';
        
        const errorElement = document.getElementById('error-message');
        const retryButton = document.getElementById('retry-button');
        
        function fetchSheetDataJSONP() {
            return new Promise((resolve, reject) => {
                window.handleJSONPResponse = function(data) {
                    if (scriptElement.parentNode) {
                        scriptElement.parentNode.removeChild(scriptElement);
                    }
                    resolve(data);
                };
                
                const cacheBuster = new Date().getTime();
                const requestUrl = `${GAS_URL}?callback=handleJSONPResponse&v=${cacheBuster}`;
                
                const scriptElement = document.createElement('script');
                scriptElement.src = requestUrl;
                scriptElement.onerror = function() {
                    if (scriptElement.parentNode) {
                        scriptElement.parentNode.removeChild(scriptElement);
                    }
                    reject(new Error('Gagal menghubungkan ke server Google Apps Script.'));
                };
                
                setTimeout(() => {
                    if (scriptElement.parentNode) {
                        scriptElement.parentNode.removeChild(scriptElement);
                    }
                    reject(new Error('Koneksi waktu habis (Timeout).'));
                }, 12000);
                
                document.body.appendChild(scriptElement);
            });
        }
        
        async function fetchSheetDataFetch() {
            const cacheBuster = new Date().getTime();
            const requestUrl = `${GAS_URL}?v=${cacheBuster}`;
            const response = await fetch(requestUrl);
            if (!response.ok) {
                throw new Error(`Status server: ${response.status}`);
            }
            return await response.json();
        }
        
        function displayHTML(htmlContent) {
            const iframe = document.getElementById('contentIframe');
            document.getElementById('loader').style.display = 'none';
            iframe.style.display = 'block';
            
            iframe.contentDocument.open();
            iframe.contentDocument.write(htmlContent);
            iframe.contentDocument.close();
        }
        
        function showError(message) {
            console.error('Error:', message);
            errorElement.innerText = message;
            retryButton.style.display = 'inline-block';
        }
        
        async function fetchSheetData() {
            errorElement.innerText = '';
            retryButton.style.display = 'none';
            
            try {
                const data = await fetchSheetDataFetch();
                if (data.status === 'success' && data.html) {
                    displayHTML(data.html);
                } else {
                    showError(data.message || 'Data HTML tidak ditemukan di Spreadsheet.');
                }
            } catch (fetchError) {
                try {
                    const data = await fetchSheetDataJSONP();
                    if (data.status === 'success' && data.html) {
                        displayHTML(data.html);
                    } else {
                        showError(data.message || 'Data HTML tidak ditemukan.');
                    }
                } catch (jsonpError) {
                    showError('Gagal memuat aplikasi. Pastikan Google Apps Script sudah menambahkan fungsi doGet dan di-deploy ulang.');
                }
            }
        }
        
        window.onload = fetchSheetData;
    </script>
</body>
</html>
