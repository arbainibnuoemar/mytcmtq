<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen HTML from Google Sheets</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Fullscreen HTML">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Manifest JSON dimasukkan langsung -->
    <script>
        // Membuat manifest JSON inline
        const manifestData = {
            "name": "Fullscreen HTML",
            "short_name": "FullHTML",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#ffffff",
            "icons": [
                {
                    "src": "https://www.gstatic.com/images/branding/product/2x/apps_script_48dp.png",
                    "sizes": "48x48",
                    "type": "image/png"
                },
                {
                    "src": "https://www.gstatic.com/images/branding/product/2x/apps_script_96dp.png",
                    "sizes": "96x96",
                    "type": "image/png"
                }
            ]
        };
        
        // Membuat Blob dari JSON
        const manifestBlob = new Blob(
            [JSON.stringify(manifestData)], 
            {type: 'application/json'}
        );
        
        // Membuat URL untuk manifest
        const manifestURL = URL.createObjectURL(manifestBlob);
        
        // Tambahkan link ke head
        document.write('<link rel="manifest" href="' + manifestURL + '">');
    </script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #error-message {
            color: red;
            max-width: 80%;
            text-align: center;
            margin-top: 15px;
        }
        #retry-button {
            margin-top: 15px;
            padding: 8px 16px;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: none;
        }
        #retry-button:hover {
            background-color: #3367d6;
        }
    </style>
</head>
<body>
    <div id="loader" class="loader">
        <div class="spinner"></div>
        <p>Loading content...</p>
        <div id="error-message"></div>
        <button id="retry-button" onclick="fetchSheetData()">Coba Lagi</button>
    </div>
    <iframe id="contentIframe" style="display:none;"></iframe>
    
    <script>
        // PENTING: Ganti URL_WEB_APP_GAS dengan URL Google Apps Script Web App Anda
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxiL3XNpliXtBjV4ZaCwWReOybbax9VgNAXMBwAqnwqn7O937t_j3YI4LBFv7sckmul/exec';
        
        // Variabel untuk menampilkan error
        const errorElement = document.getElementById('error-message');
        const retryButton = document.getElementById('retry-button');
        
        // Fungsi untuk mengambil data dengan JSONP (mengatasi CORS)
        function fetchSheetDataJSONP() {
            return new Promise((resolve, reject) => {
                // Fungsi callback yang akan dipanggil oleh server
                window.handleJSONPResponse = function(data) {
                    // Hapus script setelah digunakan
                    if (scriptElement.parentNode) {
                        scriptElement.parentNode.removeChild(scriptElement);
                    }
                    resolve(data);
                };
                
                // Tambahkan parameter ke URL untuk menghindari caching
                const cacheBuster = new Date().getTime();
                const requestUrl = `${GAS_URL}?callback=handleJSONPResponse&v=${cacheBuster}`;
                
                // Buat elemen script untuk JSONP request
                const scriptElement = document.createElement('script');
                scriptElement.src = requestUrl;
                scriptElement.onerror = function() {
                    if (scriptElement.parentNode) {
                        scriptElement.parentNode.removeChild(scriptElement);
                    }
                    reject(new Error('Failed to load script'));
                };
                
                // Tambahkan timeout untuk mencegah hanging
                const timeoutId = setTimeout(() => {
                    if (scriptElement.parentNode) {
                        scriptElement.parentNode.removeChild(scriptElement);
                    }
                    reject(new Error('Request timeout'));
                }, 10000);
                
                // Tambahkan script ke document
                document.body.appendChild(scriptElement);
            });
        }
        
        // Fungsi untuk mengambil data dengan fetch API (metode utama)
        async function fetchSheetDataFetch() {
            // Tambahkan parameter ke URL untuk menghindari caching
            const cacheBuster = new Date().getTime();
            const requestUrl = `${GAS_URL}?v=${cacheBuster}`;
            
            const response = await fetch(requestUrl);
            if (!response.ok) {
                throw new Error(`Server responded with status: ${response.status}`);
            }
            
            return await response.json();
        }
        
        // Fungsi untuk menampilkan konten HTML
        function displayHTML(htmlContent) {
            const iframe = document.getElementById('contentIframe');
            document.getElementById('loader').style.display = 'none';
            iframe.style.display = 'block';
            
            // Menulis konten ke dalam iframe
            iframe.contentDocument.open();
            iframe.contentDocument.write(htmlContent);
            iframe.contentDocument.close();
        }
        
        // Fungsi untuk menampilkan error
        function showError(message) {
            console.error('Error:', message);
            errorElement.innerText = 'Error: ' + message;
            retryButton.style.display = 'inline-block';
        }
        
        // Fungsi utama untuk mengambil data dengan fallback
        async function fetchSheetData() {
            // Reset UI
            errorElement.innerText = '';
            retryButton.style.display = 'none';
            
            try {
                // Coba metode fetch terlebih dahulu
                console.log("Mencoba fetch API...");
                const data = await fetchSheetDataFetch();
                
                if (data.status === 'success') {
                    displayHTML(data.html);
                } else {
                    showError(data.message || 'Unknown error');
                }
            } catch (fetchError) {
                console.error('Fetch failed:', fetchError);
                
                try {
                    // Jika fetch gagal, coba JSONP sebagai fallback
                    console.log("Mencoba JSONP sebagai fallback...");
                    const data = await fetchSheetDataJSONP();
                    
                    if (data.status === 'success') {
                        displayHTML(data.html);
                    } else {
                        showError(data.message || 'Unknown error');
                    }
                } catch (jsonpError) {
                    console.error('JSONP fallback failed:', jsonpError);
                    
                    // Semua metode gagal, tampilkan pesan error gabungan
                    showError(`Gagal mengambil data. Pastikan URL Apps Script benar dan dapat diakses. (${fetchError.message})`);
                }
            }
        }
        
        // Jalankan saat halaman dimuat
        window.onload = fetchSheetData;
    </script>
</body>
</html>
